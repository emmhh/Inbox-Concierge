services:
  postgres:
    image: postgres:16-alpine
    container_name: inbox_concierge_db
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
      POSTGRES_DB: inbox_concierge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox -d inbox_concierge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
